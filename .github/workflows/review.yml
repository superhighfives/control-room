name: Claude Code Review (reusable)

on:
  workflow_call:
    inputs:
      runs_on:
        description: >-
          Runner label. Use macos-latest for anything needing Xcode.
        type: string
        required: false
        default: ubuntu-latest
      runtime:
        description: >-
          Which runtime to set up before setup_command — "node", "bun", or
          "none" when the toolchain is already on the runner. Ignored when
          setup_command is empty.
        type: string
        required: false
        default: node
      node_version:
        description: Node version, when runtime is "node".
        type: string
        required: false
        default: '22'
      setup_command:
        description: >-
          Command that installs dependencies, so the reviewer can actually run
          your typechecker and linter instead of reasoning about them from
          source. Empty skips install entirely.
        type: string
        required: false
        default: ''
      verify_commands:
        description: >-
          Commands the reviewer should run against the branch, one per line.
          Only useful alongside setup_command.
        type: string
        required: false
        default: ''
      standards_ref:
        description: Ref of superhighfives/control-room to pin the review standard to.
        type: string
        required: false
        default: main
      timeout_minutes:
        description: Fail loudly rather than hanging to GitHub's 6h default.
        type: number
        required: false
        default: 20
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    # Newest push to a PR wins; cancel stale review runs instead of piling up.
    concurrency:
      group: claude-review-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the reviewer can read git blame for context.
          fetch-depth: 0

      - name: Checkout review standard
        uses: actions/checkout@v4
        with:
          repository: superhighfives/control-room
          ref: ${{ inputs.standards_ref }}
          path: .claude-review

      - name: Set up Node
        if: inputs.setup_command != '' && inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Bun
        if: inputs.setup_command != '' && inputs.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: inputs.setup_command != ''
        run: |
          if [ "${{ inputs.runtime }}" = "node" ]; then corepack enable; fi
          ${{ inputs.setup_command }}

      - name: Mark review start
        id: started
        run: echo "at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Without this the job is a black box: Claude runs for minutes,
          # produces nothing visible, and a failure to post looks identical
          # to a clean review.
          show_full_output: true
          # Agent mode grants no tools by default, so the review had no way to
          # run gh, git blame, or the verify commands. Bash is broad, but fork
          # PRs don't receive secrets and the token is read-mostly.
          claude_args: |
            --allowedTools Bash,Read,Grep,Glob
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }}, then post your review as a PR comment
            using `gh pr comment`.

            Read these two files first and follow them exactly:

            - `.claude-review/REVIEW.md` — how to review. The sections to
              write, what you are expected to raise, what to leave alone.
            - `.claude-review/BASELINE.md` — the language-agnostic rules the
              change must hold to. Flag violations of its Rules section. Do not
              flag anything in its Preferences section or its linter section.

            Then list `.claude-review/languages/` and read the file for each
            language this PR actually touches, if one exists. Those sharpen the
            baseline into the specific forms its rules take in that language.
            Skip the ones the PR doesn't touch, and don't invent rules for a
            language with no file — fall back to the baseline and the
            conventions visible in the surrounding code.

            Then read this repository's own CLAUDE.md files, if any — the root
            one, plus any in directories this PR touched. They add to the
            baseline, and they win where the two disagree. Say which file a rule
            came from when you flag it.

            ${{ inputs.verify_commands != '' && 'Dependencies are installed. Run these commands and report the real output:' || 'Dependencies are NOT installed in this sandbox. Do not claim you ran the typechecker or linter — say plainly that you reviewed by reading.' }}
            ${{ inputs.verify_commands }}

      # The action exits 0 in several silent cases — most commonly workflow
      # validation ("the workflow file must have identical content to the
      # version on the default branch"), which fires on any PR that edits the
      # review workflow. A green check with no comment is indistinguishable
      # from a clean review, which is the exact failure this whole setup
      # exists to prevent. So say something, every time.
      - name: Say something if no review was posted
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SINCE: ${{ steps.started.outputs.at }}
          BASE: ${{ github.event.pull_request.base.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MARKER: '<!-- control-room:no-review -->'
        run: |
          set -euo pipefail

          posted=$(gh api "repos/$REPO/issues/$PR/comments?since=$SINCE" \
            --jq '[.[] | select(.user.login | test("claude"; "i"))] | length')
          if [ "$posted" -gt 0 ]; then
            echo "Review posted; nothing to do."
            exit 0
          fi

          # Don't repeat ourselves on every push to the same PR.
          if gh api "repos/$REPO/issues/$PR/comments" --paginate \
               --jq '.[].body' | grep -qF "$MARKER"; then
            echo "Already explained on this PR; not commenting again."
            exit 0
          fi

          if ! git diff --quiet "origin/$BASE" HEAD -- .github/workflows/; then
            reason="This PR changes a file under \`.github/workflows/\`. The action requires the
          workflow file to be byte-identical to the copy on \`$BASE\`, so it skips
          and exits 0 — which is why the check is green. **This PR has not been
          reviewed.** It will work normally once merged."
          else
            reason="The review step finished without leaving a comment, and this PR doesn't
          touch \`.github/workflows/\`, so workflow validation isn't the cause.
          Worth checking the run log."
          fi

          gh pr comment "$PR" --repo "$REPO" --body "$MARKER
          ### Code review skipped

          $reason

          [Run log]($RUN_URL)"
